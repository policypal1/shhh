<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wexley Light: Storm, Sabotage, and the Last Keeper | Historical Archives Quarterly</title>
  <meta name="description" content="A long-form archival feature on the Cape Wexley lighthouse, keeper Josiah Penn, and the 1863 storm that nearly changed Union supply routes." />
  <meta name="theme-color" content="#14110e" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:wght@400;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,700;6..72,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #17120e;
      --muted: #6f665f;
      --faint: #9b9188;
      --paper: #f8f4eb;
      --sheet: #fffdf8;
      --line: #ded2c4;
      --line-dark: #bba995;
      --red: #8b1f1a;
      --red-dark: #5f1513;
      --gold: #b88a44;
      --charcoal: #171717;
      --serif: 'Newsreader', 'Libre Baskerville', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--serif);
      background:
        radial-gradient(circle at 20% 0%, rgba(139, 31, 26, 0.055), transparent 32rem),
        linear-gradient(180deg, #fbf8f1 0%, var(--paper) 42%, #f1e8dc 100%);
      color: var(--ink);
      line-height: 1.72;
      font-size: 17px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(23, 18, 14, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 18, 14, 0.014) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0.65;
      z-index: -1;
    }

    a { color: var(--red); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button, input, select { font: inherit; }
    img { max-width: 100%; display: block; }

    .top-line {
      background: #15110e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #d3c7b8;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    .top-line-inner {
      max-width: 1240px;
      min-height: 34px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .top-line-left,
    .top-line-right {
      display: flex;
      align-items: center;
      gap: 16px;
      white-space: nowrap;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(139, 31, 26, 0.24);
      display: inline-block;
      margin-right: 6px;
    }

    .top-line a { color: #d3c7b8; }
    .top-line .dim { color: #9f9283; }

    .masthead {
      background: rgba(255, 253, 248, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 3px double var(--ink);
    }

    .masthead-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 30px 20px 22px;
    }

    .masthead-grid {
      display: grid;
      grid-template-columns: 1fr minmax(420px, 680px) 1fr;
      gap: 24px;
      align-items: center;
    }

    .issue-card,
    .weather-card {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .issue-card strong,
    .weather-card strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .weather-card { text-align: right; }

    .brand {
      text-align: center;
    }

    .brand .kicker {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .brand h1 {
      font-family: var(--serif);
      font-weight: 800;
      font-size: clamp(40px, 6vw, 76px);
      line-height: 0.9;
      letter-spacing: -0.045em;
    }

    .brand .tagline {
      margin-top: 10px;
      font-size: 14px;
      color: #756b61;
      font-style: italic;
    }

    .masthead-rule {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .subscribe-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--red);
      color: #fff !important;
      background: var(--red);
      padding: 8px 13px;
      border-radius: 999px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.06em;
    }

    .main-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 253, 248, 0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(23, 18, 14, 0.035);
    }

    .nav-inner {
      max-width: 1240px;
      height: 48px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 22px;
      overflow-x: auto;
      scrollbar-width: none;
      font-family: var(--sans);
    }

    .nav-inner::-webkit-scrollbar { display: none; }

    .nav-inner a {
      color: #2b2723;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .nav-inner a:hover { color: var(--red); text-decoration: none; }

    .nav-spacer { margin-left: auto; }

    .search-chip {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fffaf2;
      white-space: nowrap;
      cursor: pointer;
    }

    .breaking {
      max-width: 1240px;
      margin: 18px auto 0;
      padding: 0 20px;
      font-family: var(--sans);
    }

    .breaking-inner {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fffaf2;
      border: 1px solid var(--line);
      border-left: 4px solid var(--red);
      padding: 10px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .breaking strong {
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-size: 11px;
      white-space: nowrap;
    }

    .breadcrumbs {
      max-width: 1240px;
      margin: 18px auto 0;
      padding: 0 20px;
      font-family: var(--sans);
      font-size: 12px;
      color: var(--muted);
    }

    .breadcrumbs a { color: var(--muted); }
    .breadcrumbs .sep { margin: 0 7px; color: var(--line-dark); }

    .layout {
      max-width: 1240px;
      margin: 22px auto 42px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 336px;
      gap: 38px;
      align-items: start;
    }

    .article-card {
      background: var(--sheet);
      border: 1px solid var(--line);
      box-shadow: 0 22px 50px rgba(23, 18, 14, 0.07);
    }

    article {
      padding: clamp(28px, 4vw, 56px);
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      font-family: var(--sans);
    }

    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--red);
      color: #fff;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      border-radius: 3px;
    }

    .category-tag::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #fff;
      opacity: 0.9;
    }

    .article-tools {
      display: flex;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .tool-pill {
      border: 1px solid var(--line);
      padding: 6px 9px;
      border-radius: 999px;
      background: #fffaf2;
    }

    .article-title {
      font-family: var(--serif);
      font-size: clamp(42px, 6vw, 74px);
      line-height: 0.94;
      letter-spacing: -0.045em;
      font-weight: 800;
      max-width: 920px;
      margin-bottom: 18px;
    }

    .deck {
      font-size: clamp(19px, 2.3vw, 24px);
      line-height: 1.42;
      color: #504941;
      font-weight: 400;
      max-width: 900px;
      margin-bottom: 26px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .byline-strip {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      font-family: var(--sans);
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, #dfc18d 0 18%, transparent 19%),
        linear-gradient(135deg, #5e4b3d, #a78352);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: var(--serif);
      font-weight: 800;
      letter-spacing: -0.03em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
    }

    .byline-main { line-height: 1.42; font-size: 13px; color: var(--muted); }
    .byline-main strong { color: var(--ink); }
    .byline-main a { font-weight: 800; }

    .read-meta {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .read-meta strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
    }

    .hero-image {
      height: clamp(320px, 45vw, 520px);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line-dark);
      background:
        linear-gradient(180deg, rgba(13, 19, 27, 0.08), rgba(13, 19, 27, 0.86)),
        radial-gradient(circle at 50% 20%, rgba(255, 231, 172, 0.95) 0 6%, rgba(255, 231, 172, 0.34) 7% 13%, transparent 14%),
        linear-gradient(135deg, #314458 0%, #5d7080 42%, #9a9a8d 72%, #d3b783 100%);
      box-shadow: inset 0 -70px 120px rgba(0,0,0,0.35);
    }

    .hero-image::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 11%;
      width: 82px;
      height: 265px;
      transform: translateX(-50%);
      border-radius: 8px 8px 2px 2px;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.22), transparent 30%, rgba(255,255,255,0.14) 55%, rgba(0,0,0,0.32)),
        repeating-linear-gradient(0deg, #736052 0 18px, #675345 18px 36px);
      box-shadow: 18px 20px 70px rgba(0,0,0,0.45);
    }

    .hero-image::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 51%;
      width: 120px;
      height: 54px;
      transform: translateX(-50%);
      border-radius: 14px 14px 5px 5px;
      background:
        linear-gradient(90deg, #271f1b, #4e3b31 45%, #201815);
      box-shadow: 0 0 54px 14px rgba(255, 212, 116, 0.55);
    }

    .hero-overlay {
      position: absolute;
      inset: auto 0 0;
      padding: 22px;
      color: rgba(255,255,255,0.88);
      font-family: var(--sans);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.6));
    }

    .caption {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      font-style: italic;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .caption strong { color: var(--ink); font-style: normal; }

    .article-body {
      max-width: 780px;
      margin-top: 30px;
    }

    .article-body p { margin-bottom: 19px; }

    .article-body > p:first-child::first-letter {
      float: left;
      font-family: var(--serif);
      font-size: 78px;
      line-height: 0.82;
      font-weight: 800;
      padding: 10px 12px 2px 0;
      color: var(--red);
    }

    .article-body h2 {
      font-family: var(--serif);
      font-size: 31px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 42px 0 14px;
    }

    .inline-note {
      background: #fff8ea;
      border: 1px solid #e8d4ad;
      border-left: 4px solid var(--gold);
      padding: 16px 18px;
      margin: 26px 0;
      font-family: var(--sans);
      font-size: 13px;
      color: #5c4b38;
      line-height: 1.55;
    }

    .pull-quote {
      margin: 32px 0;
      padding: 24px 28px;
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--line-dark);
      background:
        linear-gradient(90deg, rgba(139,31,26,0.08), transparent 40%),
        #fffaf3;
      font-size: 23px;
      line-height: 1.4;
      color: #2b241f;
      font-weight: 500;
    }

    .pull-quote cite {
      display: block;
      margin-top: 12px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-style: normal;
      font-weight: 800;
    }

    .document-scan {
      margin: 28px 0;
      border: 1px solid var(--line-dark);
      background: #eee2ce;
      padding: 16px;
      transform: rotate(-0.4deg);
      box-shadow: 0 18px 34px rgba(23,18,14,0.12);
    }

    .document-paper {
      min-height: 220px;
      padding: 22px;
      background:
        linear-gradient(90deg, rgba(132, 94, 52, 0.1) 1px, transparent 1px),
        linear-gradient(#fdf4df, #f5e8cb);
      background-size: 28px 100%, 100% 100%;
      border: 1px solid rgba(72, 53, 35, 0.18);
      color: #5a4532;
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 14px;
      line-height: 1.85;
    }

    .footnote-ref {
      color: var(--red);
      font-family: var(--sans);
      font-weight: 800;
      font-size: 11px;
      vertical-align: super;
      margin-left: 2px;
    }

    .secret-trigger {
      cursor: pointer;
      user-select: none;
      border-bottom: 1px dotted rgba(139, 31, 26, 0.35);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 38px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      font-family: var(--sans);
    }

    .tag {
      font-size: 12px;
      color: #5d5147;
      background: #f0e6d8;
      border: 1px solid #e1d3c0;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
    }

    .author-box {
      margin-top: 32px;
      background: #fbf4e9;
      border: 1px solid var(--line);
      padding: 22px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
    }

    .author-box h3 {
      font-family: var(--serif);
      font-size: 20px;
      margin-bottom: 5px;
    }

    .author-box p {
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .source-list {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid var(--ink);
      font-family: var(--sans);
      font-size: 13px;
      color: #514940;
    }

    .source-list h3 {
      font-family: var(--sans);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .source-list ol { padding-left: 20px; }
    .source-list li { margin-bottom: 8px; line-height: 1.5; }

    .discussion {
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .discussion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      font-family: var(--sans);
    }

    .discussion-header h3 {
      font-family: var(--serif);
      font-size: 22px;
    }

    .comment {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      padding: 14px 0;
      border-top: 1px solid #eee2d3;
      font-family: var(--sans);
    }

    .comment .avatar {
      width: 36px;
      height: 36px;
      font-size: 12px;
    }

    .comment strong { font-size: 13px; }
    .comment time { color: var(--faint); font-size: 11px; margin-left: 6px; }
    .comment p { color: #4b453f; font-size: 13px; line-height: 1.55; margin-top: 3px; }

    aside {
      position: sticky;
      top: 66px;
      font-family: var(--sans);
    }

    .side-card {
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid var(--line);
      margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(23,18,14,0.045);
    }

    .side-card-inner { padding: 18px; }

    .side-title {
      font-family: var(--serif);
      font-size: 19px;
      line-height: 1.05;
      padding-bottom: 10px;
      margin-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }

    .most-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #eadfce;
    }

    .most-item:last-child { border-bottom: 0; }

    .most-num {
      font-family: var(--serif);
      font-size: 30px;
      line-height: 0.9;
      color: #cbbba8;
      font-weight: 800;
    }

    .most-item a {
      color: var(--ink);
      font-family: var(--serif);
      font-weight: 700;
      font-size: 15px;
      line-height: 1.22;
    }

    .most-item span {
      display: block;
      margin-top: 5px;
      color: var(--faint);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .newsletter {
      background:
        radial-gradient(circle at 85% 0%, rgba(184,138,68,0.2), transparent 18rem),
        #16120f;
      color: #fff;
      border-color: #16120f;
    }

    .newsletter p {
      color: #cbbfb1;
      font-size: 13px;
      line-height: 1.55;
      margin: 8px 0 14px;
    }

    .newsletter input {
      width: 100%;
      background: #0d0b09;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 3px;
      padding: 11px;
      font-size: 13px;
      margin-bottom: 9px;
      font-family: var(--sans);
    }

    .newsletter button,
    .solid-btn {
      width: 100%;
      border: 0;
      background: var(--red);
      color: #fff;
      padding: 11px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ad-unit {
      padding: 12px;
      text-align: center;
    }

    .ad-label {
      color: var(--faint);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 8px;
    }

    .ad-art {
      height: 245px;
      display: grid;
      place-items: center;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.55)),
        radial-gradient(circle at 50% 20%, rgba(255,226,155,0.9) 0 10%, transparent 11%),
        linear-gradient(145deg, #453225, #a7753a);
      font-family: var(--serif);
      padding: 18px;
    }

    .ad-art strong {
      display: block;
      font-size: 22px;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .event-list p {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .event-list strong { color: var(--ink); }

    .related {
      max-width: 1240px;
      margin: 0 auto 44px;
      padding: 0 20px;
    }

    .section-heading {
      font-family: var(--serif);
      font-size: 28px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 10px;
      margin-bottom: 18px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .related-card {
      background: var(--sheet);
      border: 1px solid var(--line);
      color: var(--ink);
      box-shadow: 0 12px 30px rgba(23,18,14,0.045);
    }

    .related-thumb {
      height: 155px;
      background: linear-gradient(135deg, #2f4453, #a7793d);
      border-bottom: 1px solid var(--line);
